<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>M-ASCK Ω | ADMIN</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body class="bg-black text-red-600 p-10 font-mono">
    <h1 class="text-3xl font-black mb-10 border-b border-red-900 pb-5">CENTRE DE CONTRÔLE Ω</h1>
    <div id="list" class="space-y-4">Récupération des signaux...</div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKcddqJRbgslWE6rpA@j6eW7CyrSkDjEA",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "m-asck-core",
            storageBucket: "m-asck-core.firebasestorage.app",
            messagingSenderId: "396799678615",
            appId: "1:396799678615:web:b52c28c1e9e99f6a3ff1d2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('users').on('value', (snap) => {
            const users = snap.val();
            let html = "";
            for (let id in users) {
                const u = users[id];
                html += `<div class="border border-red-900 p-5 rounded-2xl flex justify-between items-center bg-zinc-950">
                    <p>ID: <span class="text-white font-bold">${u.customID}</span> [${u.status}]</p>
                    <button onclick="update('${id}', 'active')" class="bg-red-700 text-white px-5 py-2 rounded-lg font-bold uppercase text-[10px]">ACTIVER Ω</button>
                </div>`;
            }
            document.getElementById('list').innerHTML = html || "Aucune demande.";
        });
        function update(uid, stat) { db.ref('users/' + uid).update({ status: stat }); }
    </script>
</body>
</html>
