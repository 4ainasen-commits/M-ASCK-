<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ω COMMAND CENTER</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #000; color: #f00; font-family: monospace; padding: 40px; }
        .card { background: #050505; border: 1px solid #222; border-left: 5px solid #f00; padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        button { transition: 0.3s; }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black mb-10 border-b border-red-900 pb-5 uppercase italic tracking-tighter">M-ASCK Ω Command</h1>
        <div id="list" class="space-y-4 text-xs">Extraction des signaux...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKcddqJRbgslWE6rpA@j6eW7CyrSkDjEA",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "m-asck-core",
            storageBucket: "m-asck-core.firebasestorage.app",
            messagingSenderId: "396799678615",
            appId: "1:396799678615:web:b52c28c1e9e99f6a3ff1d2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('users').on('value', (snap) => {
            const users = snap.val();
            let html = "";
            for (let id in users) {
                const u = users[id];
                html += `
                <div class="card flex justify-between items-center shadow-2xl">
                    <div>
                        <p class="text-zinc-500 font-bold mb-1">ID CLIENT: <span class="text-white">${u.customID}</span></p>
                        <p class="uppercase">Status: <span class="${u.status === 'active' ? 'text-green-500' : 'text-red-500'}">${u.status}</span></p>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="update('${id}', 'active')" class="bg-red-700 text-white px-8 py-3 rounded-xl font-bold uppercase">Activate Ω</button>
                        <button onclick="update('${id}', 'locked')" class="bg-zinc-900 text-zinc-500 px-8 py-3 rounded-xl font-bold uppercase">Kill</button>
                    </div>
                </div>`;
            }
            document.getElementById('list').innerHTML = html || "Aucune demande en attente.";
        });

        function update(uid, stat) {
            db.ref('users/' + uid).update({ status: stat });
        }
    </script>
</body>
</html>
