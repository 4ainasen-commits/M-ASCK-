<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-ASCK Ω</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { background: #000; color: #f00; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .pulsing { font-size: 2.5rem; font-weight: bold; cursor: pointer; animation: pulse 2s infinite; letter-spacing: 5px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .glass { background: rgba(10,10,10,0.98); border: 1px solid #f00; padding: 40px; border-radius: 40px; width: 350px; text-align: center; }
        input { background: #050505 !important; border: 1px solid #222 !important; color: #fff !important; text-align: center; }
    </style>
</head>
<body>
    <div class="glass">
        <!-- 🔴 ADMIN TRIGGER: Tsindrio ity mandritra ny 10 segondra -->
        <div id="logo-trigger" class="pulsing mb-10" onmousedown="startT()" onmouseup="stopT()" ontouchstart="startT()" ontouchend="stopT()">M-ASCK Ω</div>
        
        <input id="q" type="text" placeholder="REQUISITION ID" class="w-full p-4 rounded-xl font-black uppercase mb-6 outline-none border-red-900/30 focus:border-red-600">
        
        <button onclick="runPulse()" id="btn" class="w-full py-4 bg-red-700 text-white font-black rounded-xl shadow-2xl uppercase text-[10px] mb-6">Lancer Réquisition Ω</button>
        
        <div class="border-t border-red-900/20 pt-6">
            <button onclick="wa()" class="text-blue-500 text-[10px] uppercase font-bold underline">Demander Activation via WhatsApp</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKcddqJRbgslWE6rpA@j6eW7CyrSkDjEA",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "m-asck-core",
            storageBucket: "m-asck-core.firebasestorage.app",
            messagingSenderId: "396799678615",
            appId: "1:396799678615:web:b52c28c1e9e99f6a3ff1d2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🕰️ ADMIN TIMER
        let t;
        function startT() { t = setTimeout(() => { window.location.href = "admin.html"; }, 10000); }
        function stopT() { clearTimeout(t); }

        // 🛰️ WHATSAPP FIX
        function wa() {
            const id = "ASCK-" + Math.floor(Math.random() * 9999);
            const msg = "Bonjour Administration M-ASCK. Je souhaite activer mon ID : " + id;
            window.open("https://wa.me" + encodeURIComponent(msg), "_blank");
        }

        // 🔓 LAUNCH LOGIC
        function runPulse() {
            const id = document.getElementById('q').value;
            if(!id) return;
            document.getElementById('btn').innerText = "SYNCHRONIZING...";

            db.ref('users/' + id).once('value', (s) => {
                if(s.exists() && s.val().status === 'active') {
                    alert("SIGNAL LOCKED. Dashboard ouvert.");
                } else {
                    db.ref('users/' + id).set({ customID: id, status: 'locked' });
                    alert("Awaiting Admin Activation.");
                }
                document.getElementById('btn').innerText = "Lancer Réquisition Ω";
            }).catch(e => alert("DATABASE_ERROR: Jereo ny Rules ao amin'ny Firebase"));
        }
    </script>
</body>
</html>
