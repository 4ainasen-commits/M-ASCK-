<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-ASCK Ω</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; color:#fff; font-family:monospace; overflow:hidden; }
        #map { position:absolute; inset:0; z-index:1; filter:invert(1) hue-rotate(180deg) brightness(0.4); display:none; }
        .ui-overlay { position:absolute; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.95); }
        .pulsing { color:#f00; font-size:2.5rem; font-weight:bold; cursor:pointer; animation:pulse 2s infinite; letter-spacing:5px; }
        @keyframes pulse { 0%, 100% { opacity:1; } 50% { opacity:0.2; } }
        .glass { background:rgba(15,15,15,0.98); border:1px solid #f00; padding:40px; border-radius:40px; width:90%; max-width:400px; text-align:center; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        input { background:#050505!important; border:1px solid #222!important; color:#fff!important; text-align:center; outline:none; }
        .hidden-trigger { position:absolute; top:0; left:0; width:100%; height:80px; z-index:200; cursor:pointer; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="hidden-trigger" onmousedown="startAdminTimer()" onmouseup="stopAdminTimer()" ontouchstart="startAdminTimer()" ontouchend="stopAdminTimer()"></div>

    <div id="auth-screen" class="ui-overlay">
        <div class="pulsing mb-10">M-ASCK Ω</div>
        <div class="glass space-y-6">
            <input id="client-id" type="text" placeholder="ID REQUISITION" class="w-full p-5 rounded-2xl font-black text-xl uppercase border-red-900/30 focus:border-red-600">
            <button onclick="checkAccess()" id="btn-main" class="w-full py-5 bg-red-700 text-white font-black rounded-2xl shadow-2xl uppercase tracking-widest text-xs">Lancer Réquisition Ω</button>
            <div class="pt-6 border-t border-white/5">
                <button onclick="contactAdmin()" class="text-blue-500 text-[10px] uppercase font-bold tracking-widest">Demander Activation via WhatsApp</button>
            </div>
        </div>
    </div>

    <div id="module-1" class="hidden absolute top-5 left-5 z-[150] w-72 glass !p-5 !border-l-4 !border-red-600">
        <p class="text-red-600 font-black text-[10px] uppercase mb-2 tracking-widest tracking-tighter">Signal Locked</p>
        <div class="text-[11px] space-y-1 uppercase text-zinc-400">
            <p>Target: <span id="res-id" class="text-white">---</span></p>
            <p>Radar: <span class="text-green-500 font-bold">Active HD</span></p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKcddqJRbgslWE6rpA@j6eW7CyrSkDjEA",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "m-asck-core",
            storageBucket: "m-asck-core.firebasestorage.app",
            messagingSenderId: "396799678615",
            appId: "1:396799678615:web:b52c28c1e9e99f6a3ff1d2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let timer;
        function startAdminTimer() { timer = setTimeout(() => { window.location.href = "admin.html"; }, 10000); }
        function stopAdminTimer() { clearTimeout(timer); }

        function contactAdmin() {
            const randomID = "ASCK-" + Math.floor(1000 + Math.random() * 9000);
            const msg = "Bonjour Administration M-ASCK. Je souhaite activer mon ID : " + randomID;
            window.open("https://wa.me" + encodeURIComponent(msg), "_blank");
        }

        function checkAccess() {
            const inputId = document.getElementById('client-id').value;
            if(!inputId) return;
            const btn = document.getElementById('btn-main');
            btn.innerText = "SYNCHRONIZING...";

            db.ref('users').orderByChild('customID').equalTo(inputId).once('value', (snap) => {
                const data = snap.val();
                if(data) {
                    const uid = Object.keys(data)[0];
                    if(data[uid].status === 'active') { unlockUI(inputId); }
                    else { alert("En attente d'activation Admin."); btn.innerText = "Lancer Réquisition Ω"; }
                } else {
                    db.ref('users').push().set({ customID: inputId, status: 'locked', created_at: Date.now() });
                    alert("ID Enregistré. Contactez l'Admin."); btn.innerText = "Lancer Réquisition Ω";
                }
            });
        }

        function unlockUI(id) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('map').style.display = 'block';
            document.getElementById('module-1').classList.remove('hidden');
            document.getElementById('res-id').innerText = id;
            var m = L.map('map', {zoomControl:false}).setView([-18.8792, 47.5079], 16);
            L.tileLayer('https://{s}://{x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']}).addTo(m);
            L.marker([-18.8792, 47.5079]).addTo(m).bindPopup("<b style='color:red'>TARGET_LOCKED</b>").openPopup();
        }
    </script>
</body>
</html>
