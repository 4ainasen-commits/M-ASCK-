<!-- M-ASCK Ω | CLIENT INTERFACE v1.0 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-ASCK Ω</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        #map { position: absolute; inset: 0; z-index: 1; filter: invert(1) hue-rotate(180deg) brightness(0.4); visibility: hidden; }
        .ui-overlay { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
        .pulsing { animation: pulse 2s infinite; color: #f00; font-weight: bold; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 5px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid #f00; border-radius: 30px; padding: 30px; width: 90%; max-width: 400px; pointer-events: auto; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        input { background: #0a0a0a !important; border: 1px solid #333 !important; color: #fff !important; }
        input:focus { border-color: #f00 !important; outline: none; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="auth-screen" class="ui-overlay">
        <div class="pulsing mb-10">M-ASCK Ω</div>
        <div class="glass text-center space-y-6">
            <input id="client-id" type="text" placeholder="ENTER UNIQUE ID" class="w-full p-4 rounded-xl text-center font-bold">
            <button onclick="checkAccess()" class="w-full bg-red-700 hover:bg-red-600 p-5 rounded-2xl font-black uppercase text-xs tracking-widest transition-all">Launch Requisition</button>
            <div class="pt-4 border-t border-white/5">
                <button onclick="contactAdmin()" class="text-blue-500 text-[10px] uppercase tracking-widest hover:text-blue-400">Request Activation via WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAKcddqJRbgslWE6rpA@j6eW7CyrSkDjEA",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "m-asck-core",
            storageBucket: "m-asck-core.firebasestorage.app",
            messagingSenderId: "396799678615",
            appId: "1:396799678615:web:b52c28c1e9e99f6a3ff1d2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function contactAdmin() {
            const randomID = "ASCK-" + Math.floor(1000 + Math.random() * 9000);
            const msg = `Bonjour Administration M-ASCK Ω. Je souhaite activer mon accès. ID : ${randomID}`;
            window.open(`https://wa.me{encodeURIComponent(msg)}`);
        }

        function checkAccess() {
            const inputId = document.getElementById('client-id').value;
            if(!inputId) return;

            db.ref('users').orderByChild('customID').equalTo(inputId).once('value', (snap) => {
                const data = snap.val();
                if(data) {
                    const uid = Object.keys(data)[0];
                    if(data[uid].status === 'active') {
                        unlockSystem();
                    } else {
                        alert("ACCESS DENIED: Awaiting Admin Activation.");
                    }
                } else {
                    db.ref('users').push().set({
                        customID: inputId,
                        status: 'locked',
                        created_at: Date.now()
                    });
                    alert("ID REGISTERED: Contact Admin for activation.");
                }
            });
        }

        function unlockSystem() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('map').style.visibility = 'visible';
            
            var m = L.map('map', {zoomControl:false}).setView([-18.8792, 47.5079], 13);
            L.tileLayer('https://{s}://{x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']}).addTo(m);
            L.marker([-18.8792, 47.5079]).addTo(m).bindPopup("<b style='color:red'>TARGET LOCKED</b>").openPopup();
        }
    </script>
</body>
</html>
